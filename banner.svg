<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <style type="text/css">
      .title { font: bold 60px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: italic 24px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #d1d5db; }
      .matrix { font: 14px monospace; fill: #60a5fa; opacity: 0.3; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" />
  
  <!-- Decorative Matrix Elements -->
  <text x="20" y="40" class="matrix">[1 0 0] [a b]</text>
  <text x="20" y="60" class="matrix">[0 1 0] [c d]</text>
  <text x="20" y="80" class="matrix">[0 0 1] [e f]</text>
  
  <text x="1000" y="320" class="matrix">W' = W + AB</text>
  <text x="1000" y="340" class="matrix">rank(A,B) &lt;&lt; rank(W)</text>
  
  <!-- Main Text -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" class="title">Awesome-LoRA 🚀</text>
  <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" class="subtitle">A Curated List of Low-Rank Adaptation (LoRA) Variants &amp; PEFT Methods</text>
  
  <!-- Decorative Circles -->
  <circle cx="10%" cy="80%" r="50" fill="#ffffff" opacity="0.1" />
  <circle cx="90%" cy="20%" r="80" fill="#ffffff" opacity="0.05" />
</svg>
